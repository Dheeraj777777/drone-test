kind: pipeline
type: docker
name: default

steps:
  - name: install
    image: node:18
    commands:
      - npm install

  - name: build docker image
    image: docker
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
    commands:
      - docker build -t my-app .

  - name: run container
    image: docker
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
    commands:
      - docker run -d -p 3000:3000 my-app

volumes:
  - name: dockersock
    host:
      path: /var/run/docker.sock
